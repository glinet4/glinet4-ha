[mypy]
# The integration package is custom_components/glinet4 and the library it
# imports is also named glinet4. Anchor module names to the repo root so the
# integration is "custom_components.glinet4.*" and a bare "glinet4" import
# unambiguously resolves to the installed library, not this package.
explicit_package_bases = True
namespace_packages = True
mypy_path = .
python_version = 3.13
platform = linux
show_error_codes = true
follow_imports = normal
local_partial_types = true
strict_equality = true
strict_bytes = true
no_implicit_optional = true
warn_incomplete_stub = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true
enable_error_code = deprecated, ignore-without-code, redundant-self, truthy-iterable
disable_error_code = annotation-unchecked, import-not-found, import-untyped
extra_checks = false
check_untyped_defs = true
disallow_incomplete_defs = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_decorators = true
disallow_untyped_defs = true
warn_return_any = true
warn_unreachable = true
