name: release
on:
  push:
    branches:
      - main
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel a release mid-cut
jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pr: ${{ steps.rp.outputs.pr }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # release-please bumps pyproject.toml but cannot regenerate uv.lock, and its
  # GITHUB_TOKEN pushes never trigger PR CI — without this job the stale lock
  # would only surface as `uv sync --locked` failing on main AFTER the release
  # PR merges.
  sync-lock:
    needs: release-please
    if: needs.release-please.outputs.pr != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked] -- job must push the refreshed lock back
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
          persist-credentials: true
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Refresh uv.lock for the release version
        run: |
          uv lock
          if ! git diff --quiet -- uv.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: refresh uv.lock for release" -- uv.lock
            git push
          fi
