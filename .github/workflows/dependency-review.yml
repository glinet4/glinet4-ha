# Dependency Review Action
#
# Scans dependency manifest changes in a PR and surfaces known-vulnerable
# versions of packages declared or updated in the PR.
#
# https://github.com/actions/dependency-review-action
name: 'Dependency review'
on:
  pull_request:
    branches: [ "main" ]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Write permissions for pull-requests are required for the `comment-summary-in-pr` option
      pull-requests: write
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          comment-summary-in-pr: always
