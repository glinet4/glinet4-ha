name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Run pytest
        # Ephemeral uv env: no project build required (tests import the
        # integration via pythonpath), and the lockfile is left untouched.
        # Versions mirror the `test` dependency group in pyproject.toml. The
        # suite is parametrized over every router profile in-process, so a
        # single job already covers the whole matrix; --snapshot-update is
        # deliberately omitted so any drift in the committed snapshots fails CI.
        run: >
          uv run --no-project --python 3.13
          --with pytest-homeassistant-custom-component==0.13.313
          --with "glinet4 @ git+https://github.com/glinet4/glinet4@main"
          --with pytest-cov
          pytest --cov=custom_components/glinet4 --cov-report=term-missing
