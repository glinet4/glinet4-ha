name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      # Both legs delegate to scripts/test (the single source of the ephemeral uv
      # env and its pinned deps). The suite is parametrized over every router
      # profile in-process, so one run covers the whole matrix; --snapshot-update
      # is omitted so any drift in the committed snapshots fails CI.
      - name: Run pytest against the library's main branch (canary)
        # Catches integration<->library breakage before a library release.
        # --cov-fail-under matches the library's gate (current coverage ~89%).
        run: >
          ./scripts/test
          --cov=custom_components/glinet4 --cov-report=term-missing
          --cov-fail-under=85
      - name: Run pytest against the released library users install
        # The glinet4 range that actually ships (manifest.json requirements), so
        # CI also validates the combination end users get, not just main.
        run: |
          glinet4_req="$(jq -r '.requirements[] | select(startswith("glinet4"))' custom_components/glinet4/manifest.json)"
          echo "Testing against released library: ${glinet4_req}"
          GLINET4_LIB="${glinet4_req}" ./scripts/test
