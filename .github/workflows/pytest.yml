name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Run pytest
        # Delegates to scripts/test (the single source of the ephemeral uv env
        # and its pinned deps) so the pytest-hacc / glinet4 pins live in one
        # place. The suite is parametrized over every router profile in-process,
        # so a single job already covers the whole matrix; --snapshot-update is
        # deliberately omitted so any drift in the committed snapshots fails CI.
        # --cov-fail-under matches the library's gate (current coverage ~89%).
        run: >
          ./scripts/test
          --cov=custom_components/glinet4 --cov-report=term-missing
          --cov-fail-under=85
