name: Tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        # pytest-homeassistant-custom-component pins the matching HA core and
        # pulls pytest / pytest-asyncio. gli4py is the integration runtime dep.
        run: |
          python -m pip install --upgrade pip
          pip install pytest-homeassistant-custom-component==0.13.313 gli4py==0.0.17b3

      - name: Run pytest
        run: pytest
