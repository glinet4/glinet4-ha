version: 2
updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "homeassistant"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
  # Dev container base image + the pinned uv tag in .devcontainer/Dockerfile.
  - package-ecosystem: docker
    directory: "/.devcontainer"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
