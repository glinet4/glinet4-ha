version: 2
updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    # The Home-Assistant-version cluster can only move ATOMICALLY: homeassistant-
    # stubs (dev) and pytest-homeassistant-custom-component (test) each pin an
    # EXACT HA core version, so both must change in the same resolution or `uv`
    # is unsatisfiable. Dependabot cannot do this: even a `groups:` bundle
    # computes each member's change INDIVIDUALLY against the current manifest, so
    # bumping stubs while pytest-hacc is unchanged still fails and the group is
    # skipped (verified: the grouped run errored `dependency_file_not_resolvable`
    # exactly as an ungrouped one does). There is therefore no Dependabot config
    # that can advance this cluster — ignore it and bump the HA core by hand (see
    # the [dependency-groups] comments in pyproject.toml). homeassistant is the
    # deliberate runtime floor; pytest is pinned transitively by pytest-hacc.
    ignore:
      - dependency-name: "homeassistant"
      - dependency-name: "homeassistant-stubs"
      - dependency-name: "pytest-homeassistant-custom-component"
      - dependency-name: "pytest"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  # Dev container base image + the pinned uv tag in .devcontainer/Dockerfile.
  - package-ecosystem: docker
    directory: "/.devcontainer"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
