repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        # mypy runs in strict mode against the integration source only; the test
        # suite leans on AsyncMock and pytest fixtures that strict typing can't
        # model, so it is exercised by pytest rather than mypy.
        exclude: ^(tests|scripts)/
        require_serial: true
      - id: pylint
        name: pylint
        # Additional disables (wrong-import-order, unused-argument, pytest fixture
        # friction) live in [tool.pylint.messages_control] in pyproject.toml.
        entry: uv run pylint --disable=import-error,fixme,line-too-long,invalid-name,too-many-public-methods,abstract-method,overridden-final-method,too-many-instance-attributes,too-many-public-methods,too-few-public-methods,too-many-branches
        language: system
        types: [python]
        require_serial: true
      - id: codespell
        name: codespell
        entry: uv run codespell --write-changes
        language: system
        pass_filenames: false
        always_run: true
  # Biome replaces the (upstream-archived) mirrors-prettier hook. Scope: JSON
  # only — YAML is validation-gated (check-yaml/actionlint/zizmor) and Markdown
  # is unformatted by design (release-please owns CHANGELOG.md). Generated
  # files keep their generators' formatting via biome.json excludes:
  # manifest.json (hassfest), tests/fixtures (capture scripts), tests/snapshots
  # (syrupy).
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.5.3
    hooks:
      - id: biome-format
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.3
    hooks:
      - id: check-github-workflows
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor
  - repo: https://github.com/cdce8p/python-typing-update
    rev: v0.7.0
    hooks:
      # Run `python-typing-update` hook manually from time to time
      # to update python typing syntax.
      # Will require manual work, before submitting changes!
      - id: python-typing-update
        stages: [manual]
        args:
          - --py310-plus
          - --force
          - --keep-updates
        files: ^.+\.py$
